# Lazygit設定ファイル
# ~/.config/lazygit/config.yml
#
# カスタムコマンド設定:
# - output: 'logWithPty' - コマンド出力を疑似ターミナルでログに記録（色付き出力対応）
# - stream: false - ストリーミング出力無効
# - prompts - インタラクティブプロンプト設定

gui:
  theme:
    lightTheme: false
  commitLength:
    show: true

customCommands:
  - key: '<c-g>'
    context: 'files'
    command: 'ai-commit-generator --lazygit-mode'
    description: 'AIコミットメッセージ生成'
    output: 'logWithPty'
    stream: false
    prompts:
      - type: 'confirm'
        title: 'AIコミットメッセージ生成'
        body: '生成AIがコミットメッセージを作成します。続行しますか？'
  - key: '<c-x>'
    context: 'files'
    command: 'ai-commit-generator --check-env'
    description: '環境変数チェック'
    output: 'logWithPty'
    stream: false