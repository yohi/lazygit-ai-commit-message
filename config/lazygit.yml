# Lazygit設定ファイルのカスタムコマンド設定
# ~/.config/lazygit/config.yml に追加してください

customCommands:
  - key: '<c-g>'
    context: 'files'
    command: '/root/ai-commit-generator/ai-commit-generator'
    description: 'AIコミットメッセージ生成'
    subprocess: true
    prompts:
      - type: 'confirm'
        title: 'AIコミットメッセージ生成'
        body: '生成AIがコミットメッセージを作成します。続行しますか？'
  - key: '<c-x>'
    context: 'files'
    command: '/root/ai-commit-generator/ai-commit-generator --check-env'
    description: '環境変数チェック'
    subprocess: true