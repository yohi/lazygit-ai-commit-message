# Lazygit設定ファイル
# ~/.config/lazygit/config.yml

gui:
  theme:
    lightTheme: false
  commitLength:
    show: true

customCommands:
  - key: '<c-g>'
    context: 'files'
    command: 'ai-commit-generator --lazygit-mode'
    description: 'AIコミットメッセージ生成'
    stream: false
    showOutput: true
    prompts:
      - type: 'confirm'
        title: 'AIコミットメッセージ生成'
        body: '生成AIがコミットメッセージを作成します。続行しますか？'
  - key: '<c-x>'
    context: 'files'
    command: 'ai-commit-generator --check-env'
    description: '環境変数チェック'
    stream: false
    showOutput: true